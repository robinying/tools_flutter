name: tools_flutter
description: Tools multi-utility app (Flutter port of Tools Android)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  freezed_annotation: ^2.4.4
  permission_handler: ^11.4.0
  file_picker: ^8.3.7
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.5.3
  sqflite: ^2.4.2
  camera: ^0.11.1
  video_player: ^2.9.5
  gal: ^2.3.1
  google_mlkit_face_detection: ^0.13.1
  intl: ^0.20.2
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  freezed: ^2.5.8

flutter:
  uses-material-design: true
